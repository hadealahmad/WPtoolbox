<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XML to CSV | WPToolbox</title>
    <meta name="description"
        content="Transform standard WordPress export files into structured CSVs with HTML-to-Markdown conversion.">
    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://hadealahmad.github.io/WPtoolbox/xml2csv.html">
    <meta property="og:title" content="XML to CSV Converter | WPToolbox">
    <meta property="og:description" content="Convert your WP export XML to clean, structured CSV data.">
    <meta property="og:image" content="https://hadealahmad.github.io/WPtoolbox/assets/og-image.png">
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@hadealahmad">
    <meta name="twitter:title" content="XML to CSV Converter | WPToolbox">
    <meta name="twitter:description" content="Convert your WP export XML to clean, structured CSV data.">
    <meta name="twitter:image" content="https://hadealahmad.github.io/WPtoolbox/assets/og-image.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/globals.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="js/core.js" defer></script>
</head>

<body class="min-h-screen flex flex-col grid-bg">

    <!-- Navbar Container -->
    <nav id="global-nav" class="sticky top-0 z-50 glass-header"></nav>

    <!-- Main Content -->
    <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-10">

        <header class="mb-10 text-center md:text-left">
            <h1 class="text-4xl font-extrabold tracking-tighter text-white">XML to CSV Converter</h1>
            <p class="text-zinc-500 mt-2">Convert WordPress export files to CSV. Includes HTML-to-Markdown conversion
                for
                content.</p>
        </header>

        <div class="grid grid-cols-1 gap-10">
            <!-- Upload Section -->
            <div id="drop-zone"
                class="shadcn-card border-2 border-dashed border-zinc-800 p-20 text-center cursor-pointer hover:bg-zinc-900/50 group transition-none">
                <input type="file" id="fileInput" accept=".xml" class="hidden">
                <div class="flex flex-col items-center gap-6">
                    <div
                        class="w-16 h-16 bg-zinc-800 rounded-full flex items-center justify-center text-zinc-400 group-hover:scale-110 group-hover:bg-primary group-hover:text-primary-foreground transition-none">
                        <i data-lucide="upload-cloud" class="w-8 h-8"></i>
                    </div>
                    <div class="space-y-2">
                        <p class="text-xl font-semibold text-white">Drop your WordPress XML here</p>
                        <p class="text-zinc-400 text-sm">or click to browse your files</p>
                    </div>
                </div>
            </div>

            <!-- Result Section -->
            <div id="result" class="hidden space-y-4">
                <div class="flex justify-between items-center">
                    <h3 class="text-xs font-bold uppercase tracking-widest text-zinc-500">Conversion Ready</h3>
                    <button id="downloadBtn" class="shadcn-button shadcn-button-primary h-10 px-8 text-xs gap-2">
                        <i data-lucide="download" class="w-4 h-4"></i>
                        Download CSV
                    </button>
                </div>
                <div class="shadcn-card bg-zinc-950 border-zinc-800 overflow-hidden">
                    <div class="p-6 border-b border-zinc-900 flex items-center gap-4 bg-zinc-900/50">
                        <div class="p-2 bg-emerald-500/10 rounded-lg">
                            <i data-lucide="check-circle" class="w-5 h-5 text-emerald-500"></i>
                        </div>
                        <div>
                            <p id="fileName" class="text-sm font-bold text-white">File Name</p>
                            <p id="fileMeta" class="text-xs text-zinc-500 mt-0.5">0 items found</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- Global Footer Container -->
    <footer id="global-footer"></footer>

    <!-- Global Toast Container -->
    <div id="toast" class="fixed bottom-8 right-8 translate-y-24 opacity-0 z-50">
        <div class="shadcn-card px-6 py-4 bg-zinc-900 border-zinc-800 text-white flex items-center gap-3 shadow-2xl">
            <i data-lucide="check-circle" class="w-4 h-4 text-green-400"></i>
            <span id="toast-msg" class="text-sm font-medium">Notification</span>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('fileInput');
        const result = document.getElementById('result');
        const fileNameDisp = document.getElementById('fileName');
        const fileMetaDisp = document.getElementById('fileMeta');
        const downloadBtn = document.getElementById('downloadBtn');

        let csvContent = "";
        let currentFileName = "";

        dropZone.onclick = () => fileInput.click();

        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        dropZone.ondragover = (e) => {
            e.preventDefault();
            dropZone.classList.add('border-primary');
        };

        dropZone.ondragleave = () => {
            dropZone.classList.remove('border-primary');
        };

        dropZone.ondrop = (e) => {
            e.preventDefault();
            handleFile(e.dataTransfer.files[0]);
        };

        function handleFile(file) {
            if (!file || !file.name.endsWith('.xml')) {
                App.showToast('Please upload a valid WordPress XML file.');
                return;
            }

            currentFileName = file.name.replace('.xml', '.csv');
            const reader = new FileReader();
            reader.onload = (e) => processXML(e.target.result);
            reader.readAsText(file);
        }

        function htmlToMarkdown(html) {
            if (!html) return "";
            let text = html;
            text = text.replace(/<(h[1-6])>(.*?)<\/\1>/gi, (m, g1, g2) => '#'.repeat(g1[1]) + ' ' + g2 + '\n\n');
            text = text.replace(/<strong>(.*?)<\/strong>/gi, '**$1**');
            text = text.replace(/<em>(.*?)<\/em>/gi, '*$1*');
            text = text.replace(/<a href="(.*?)">(.*?)<\/a>/gi, '[$2]($1)');
            text = text.replace(/<p>(.*?)<\/p>/gi, '$1\n\n');
            text = text.replace(/<br\s*\/?>/gi, '\n');
            text = text.replace(/<li>(.*?)<\/li>/gi, '- $1\n');
            text = text.replace(/<\/?[^>]+(>|$)/g, ""); // Final strip
            return text.trim();
        }

        function processXML(xmlString) {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlString, "text/xml");
            const items = xmlDoc.getElementsByTagName("item");

            if (items.length === 0) {
                App.showToast('No items found in XML.');
                return;
            }

            let rows = [["Title", "URL", "Date", "Content (Markdown)", "Status"]];

            for (let i = 0; i < items.length; i++) {
                const title = items[i].getElementsByTagName("title")[0]?.textContent || "";
                const link = items[i].getElementsByTagName("link")[0]?.textContent || "";
                const date = items[i].getElementsByTagName("pubDate")[0]?.textContent || "";
                const encodedContent = items[i].getElementsByTagName("content:encoded")[0]?.textContent || "";
                const status = items[i].getElementsByTagName("wp:status")[0]?.textContent || "";

                const markdown = htmlToMarkdown(encodedContent);

                rows.push([
                    `"${title.replace(/"/g, '""')}"`,
                    `"${link}"`,
                    `"${date}"`,
                    `"${markdown.replace(/"/g, '""')}"`,
                    `"${status}"`
                ]);
            }

            csvContent = rows.map(r => r.join(",")).join("\n");

            fileNameDisp.textContent = currentFileName;
            fileMetaDisp.textContent = `${items.length} items successfully parsed`;
            result.classList.remove('hidden');
            dropZone.classList.add('hidden');
        }

        downloadBtn.onclick = () => {
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", currentFileName);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };
    </script>
</body>

</html>

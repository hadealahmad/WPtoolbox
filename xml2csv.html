<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XML to CSV | WPToolbox</title>
    <meta name="description"
        content="Transform standard WordPress export files into structured CSVs with HTML-to-Markdown conversion.">
    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://hadealahmad.github.io/WPtoolbox/xml2csv.html">
    <meta property="og:title" content="XML to CSV Converter | WPToolbox">
    <meta property="og:description" content="Convert your WP export XML to clean, structured CSV data.">
    <meta property="og:image" content="https://hadealahmad.github.io/WPtoolbox/assets/og-image.png">
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@hadealahmad">
    <meta name="twitter:title" content="XML to CSV Converter | WPToolbox">
    <meta name="twitter:description" content="Convert your WP export XML to clean, structured CSV data.">
    <meta name="twitter:image" content="https://hadealahmad.github.io/WPtoolbox/assets/og-image.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/globals.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="js/core.js" defer></script>
</head>

<body class="min-h-screen flex flex-col grid-bg">

    <!-- Navbar Container -->
    <nav id="global-nav" class="sticky top-0 z-50 glass-header"></nav>

    <!-- Main Content -->
    <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-10">

        <header class="mb-10 text-center md:text-start">
            <h1 class="text-4xl font-extrabold tracking-tighter text-white" data-i18n="tool_xml_conv_title">XML to CSV
                Converter</h1>
            <p class="text-zinc-500 mt-2" data-i18n="tool_xml_conv_desc">Transform standard WordPress export files into
                structured CSVs with built-in
                HTML to Markdown conversion.</p>
        </header>

        <div class="grid grid-cols-1 gap-10">
            <!-- Input Card -->
            <div class="shadcn-card border-zinc-800 bg-zinc-950/50 overflow-hidden">
                <!-- Tab Headers -->
                <div class="flex border-b border-zinc-800 bg-zinc-900/30">
                    <button id="tab-file-btn"
                        class="px-8 py-4 text-xs font-bold uppercase tracking-widest border-b-2 border-primary text-white transition-none"
                        data-i18n="tab_file">
                        File Upload
                    </button>
                    <button id="tab-text-btn"
                        class="px-8 py-4 text-xs font-bold uppercase tracking-widest border-b-2 border-transparent text-zinc-500 hover:text-zinc-300 transition-none"
                        data-i18n="tab_text">
                        Paste Text
                    </button>
                </div>

                <!-- Tab Content: File -->
                <div id="file-tab-content" class="p-10">
                    <div id="drop-zone"
                        class="border-2 border-dashed border-zinc-800 rounded-2xl p-20 text-center cursor-pointer hover:bg-zinc-900/50 group transition-none">
                        <input type="file" id="fileInput" accept=".xml" class="hidden">
                        <div class="flex flex-col items-center gap-6">
                            <div
                                class="w-16 h-16 bg-zinc-800 rounded-full flex items-center justify-center text-zinc-400 group-hover:scale-110 group-hover:bg-primary group-hover:text-primary-foreground transition-none">
                                <i data-lucide="upload-cloud" class="w-8 h-8"></i>
                            </div>
                            <div class="space-y-2">
                                <p class="text-xl font-semibold text-white" data-i18n="drop_xml">Drop your WordPress XML
                                    here</p>
                                <p class="text-zinc-400 text-sm" data-i18n="drop_browse">or click to browse your files
                                </p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Tab Content: Text -->
                <div id="text-tab-content" class="p-10 hidden space-y-6">
                    <textarea id="textInput"
                        class="w-full h-[400px] bg-zinc-950 border border-zinc-800 rounded-xl p-6 text-sm font-mono text-zinc-300 focus:outline-none focus:border-primary resize-none leading-relaxed"
                        placeholder="Paste your XML content here..."></textarea>
                    <div class="flex justify-end">
                        <button id="convertTextBtn"
                            class="shadcn-button shadcn-button-primary h-12 px-10 text-xs gap-2">
                            <i data-lucide="zap" class="w-4 h-4"></i>
                            <span data-i18n="btn_convert">Convert to CSV</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Result Section -->
            <div id="result" class="hidden space-y-4">
                <div class="flex justify-between items-center">
                    <h3 class="text-xs font-bold uppercase tracking-widest text-zinc-500" data-i18n="conversion_ready">
                        Conversion Ready</h3>
                    <div class="flex gap-2">
                        <button id="resetBtn" onclick="location.reload()"
                            class="shadcn-button shadcn-button-outline h-10 px-6 text-xs" data-i18n="reset_btn">
                            Reset
                        </button>
                        <button id="downloadBtn" class="shadcn-button shadcn-button-primary h-10 px-8 text-xs gap-2">
                            <i data-lucide="download" class="w-4 h-4"></i>
                            <span data-i18n="btn_download_csv">Download CSV</span>
                        </button>
                    </div>
                </div>
                <div class="shadcn-card bg-zinc-950 border-zinc-800 overflow-hidden">
                    <div class="p-6 border-b border-zinc-900 flex items-center justify-between bg-zinc-900/50">
                        <div class="flex items-center gap-4">
                            <div class="p-2 bg-emerald-500/10 rounded-lg">
                                <i data-lucide="check-circle" class="w-5 h-5 text-emerald-500"></i>
                            </div>
                            <div>
                                <p id="fileName" class="text-sm font-bold text-white">File Name</p>
                                <p id="fileMeta" class="text-xs text-zinc-500 mt-0.5">0 items found</p>
                            </div>
                        </div>
                        <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest"
                            data-i18n="preview_data">Data Preview (Top 5)</span>
                    </div>
                    <div class="overflow-x-auto">
                        <table id="previewTable" class="w-full text-left border-collapse">
                            <!-- Injected by JS -->
                        </table>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- Global Footer Container -->
    <footer id="global-footer"></footer>

    <!-- Global Toast Container -->
    <div id="toast" class="fixed bottom-8 end-8 translate-y-24 opacity-0 z-50">
        <div class="shadcn-card px-6 py-4 bg-zinc-900 border-zinc-800 text-white flex items-center gap-3 shadow-2xl">
            <i data-lucide="check-circle" class="w-4 h-4 text-green-400"></i>
            <span id="toast-msg" class="text-sm font-medium">Notification</span>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('fileInput');
        const textInput = document.getElementById('textInput');
        const fileTabBtn = document.getElementById('tab-file-btn');
        const textTabBtn = document.getElementById('tab-text-btn');
        const fileTabContent = document.getElementById('file-tab-content');
        const textTabContent = document.getElementById('text-tab-content');
        const convertTextBtn = document.getElementById('convertTextBtn');
        const result = document.getElementById('result');
        const fileNameDisp = document.getElementById('fileName');
        const fileMetaDisp = document.getElementById('fileMeta');
        const downloadBtn = document.getElementById('downloadBtn');

        let csvContent = "";
        let currentFileName = "export.csv";

        // Tab Switching Logic
        fileTabBtn.onclick = () => {
            fileTabBtn.classList.add('border-primary', 'text-white');
            fileTabBtn.classList.remove('border-transparent', 'text-zinc-500');
            textTabBtn.classList.remove('border-primary', 'text-white');
            textTabBtn.classList.add('border-transparent', 'text-zinc-500');
            fileTabContent.classList.remove('hidden');
            textTabContent.classList.add('hidden');
        };

        textTabBtn.onclick = () => {
            textTabBtn.classList.add('border-primary', 'text-white');
            textTabBtn.classList.remove('border-transparent', 'text-zinc-500');
            fileTabBtn.classList.remove('border-primary', 'text-white');
            fileTabBtn.classList.add('border-transparent', 'text-zinc-500');
            textTabContent.classList.remove('hidden');
            fileTabContent.classList.add('hidden');
        };

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        dropZone.ondragover = (e) => {
            e.preventDefault();
            dropZone.classList.add('border-primary');
        };
        dropZone.ondragleave = () => dropZone.classList.remove('border-primary');
        dropZone.ondrop = (e) => {
            e.preventDefault();
            handleFile(e.dataTransfer.files[0]);
        };

        convertTextBtn.onclick = () => {
            const content = textInput.value.trim();
            if (!content) {
                App.showToast('Please paste some XML content.');
                return;
            }
            currentFileName = "pasted-content.csv";
            processXML(content);
        };

        function handleFile(file) {
            if (!file || !file.name.endsWith('.xml')) {
                App.showToast(App.t('msg_valid_xml'));
                return;
            }
            currentFileName = file.name.replace('.xml', '.csv');
            const reader = new FileReader();
            reader.onload = (e) => processXML(e.target.result);
            reader.readAsText(file);
        }

        function htmlToMarkdown(html) {
            if (!html) return "";
            let text = html;
            text = text.replace(/<(h[1-6])>(.*?)<\/\1>/gi, (m, g1, g2) => '#'.repeat(g1[1]) + ' ' + g2 + '\n\n');
            text = text.replace(/<strong>(.*?)<\/strong>/gi, '**$1**');
            text = text.replace(/<em>(.*?)<\/em>/gi, '*$1*');
            text = text.replace(/<a href="(.*?)">(.*?)<\/a>/gi, '[$2]($1)');
            text = text.replace(/<p>(.*?)<\/p>/gi, '$1\n\n');
            text = text.replace(/<br\s*\/?>/gi, '\n');
            text = text.replace(/<li>(.*?)<\/li>/gi, '- $1\n');
            text = text.replace(/<\/?[^>]+(>|$)/g, "");
            return text.trim();
        }

        function processXML(xmlString) {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlString, "text/xml");
            const items = xmlDoc.getElementsByTagName("item");

            if (items.length === 0) {
                App.showToast(App.t('msg_no_items_xml'));
                return;
            }

            let rows = [[
                App.t('csv_h_title') || "Title",
                App.t('csv_h_url') || "URL",
                App.t('csv_h_date') || "Date",
                App.t('csv_h_content') || "Content (Markdown)",
                App.t('csv_h_status') || "Status"
            ]];

            for (let i = 0; i < items.length; i++) {
                const title = items[i].getElementsByTagName("title")[0]?.textContent || "";
                const link = items[i].getElementsByTagName("link")[0]?.textContent || "";
                const date = items[i].getElementsByTagName("pubDate")[0]?.textContent || "";
                const encodedContent = items[i].getElementsByTagName("content:encoded")[0]?.textContent || "";
                const status = items[i].getElementsByTagName("wp:status")[0]?.textContent || "";
                const markdown = htmlToMarkdown(encodedContent);
                rows.push([
                    `"${title.replace(/"/g, '""')}"`,
                    `"${link}"`,
                    `"${date}"`,
                    `"${markdown.replace(/"/g, '""')}"`,
                    `"${status}"`
                ]);
            }

            csvContent = rows.map(r => r.join(",")).join("\n");
            renderPreview(rows);
            fileNameDisp.textContent = currentFileName;
            fileMetaDisp.textContent = `${items.length} ${App.t('items_parsed_msg')}`;
            result.classList.remove('hidden');
            document.querySelector('.shadcn-card.border-zinc-800').classList.add('hidden');
            App.fireConfetti();
        }

        function renderPreview(rows) {
            const table = document.getElementById('previewTable');
            const previewRows = rows.slice(0, 6);

            table.innerHTML = `
                <thead class="bg-zinc-900/50">
                    <tr>
                        ${previewRows[0].map(h => `<th class="px-6 py-3 text-[10px] font-bold text-zinc-500 uppercase tracking-widest border-b border-zinc-900">${h}</th>`).join('')}
                    </tr>
                </thead>
                <tbody class="divide-y divide-zinc-900">
                    ${previewRows.slice(1).map(row => `
                        <tr>
                            ${row.map(cell => `<td class="px-6 py-4 text-xs text-zinc-400 max-w-[200px] truncate">${cell.replace(/^"|"$/g, '')}</td>`).join('')}
                        </tr>
                    `).join('')}
                </tbody>
            `;
        }

        downloadBtn.onclick = () => {
            App.downloadFile(csvContent, currentFileName, 'text/csv;charset=utf-8;');
            App.fireConfetti();
        };
    </script>
</body>

</html>

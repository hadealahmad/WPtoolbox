<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tips & Facts | WPToolbox</title>
    <meta name="description"
        content="A curated collection of obscure WordPress facts and production-ready solutions for hard-to-solve issues.">
    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://hadealahmad.github.io/WPtoolbox/tips.html">
    <meta property="og:title" content="WordPress Tips & Facts | WPToolbox">
    <meta property="og:description" content="Discover obscure WordPress facts and their practical solutions.">
    <meta property="og:image" content="https://hadealahmad.github.io/WPtoolbox/assets/og-image.png">
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@hadealahmad">
    <meta name="twitter:title" content="WordPress Tips & Facts | WPToolbox">
    <meta name="twitter:description" content="Discover obscure WordPress facts and their practical solutions.">
    <meta name="twitter:image" content="https://hadealahmad.github.io/WPtoolbox/assets/og-image.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/globals.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="js/core.js" defer></script>
    <script src="js/tips.js" defer></script>
</head>

<body class="min-h-screen flex flex-col grid-bg">

    <!-- Navbar Container -->
    <nav id="global-nav" class="sticky top-0 z-50 glass-header"></nav>

    <!-- Main Content -->
    <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-10">

        <header class="mb-10 text-center md:text-start">
            <h1 class="text-4xl font-extrabold tracking-tighter text-white" data-i18n="tool_tips_title">Tips & Facts
            </h1>
            <p class="text-zinc-500 mt-2" data-i18n="tool_tips_desc">Obscure WordPress behavior, hosting bottlenecks,
                and clever production-tested
                solutions.</p>
        </header>

        <!-- Tips Grid -->
        <div id="tips-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Injected by JS -->
            <div class="col-span-full py-20 text-center">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-zinc-800 border-t-primary">
                </div>
            </div>
        </div>

        <!-- Call to action -->
        <div
            class="mt-20 p-10 shadcn-card bg-primary text-primary-foreground rounded-2xl flex flex-col items-center text-center">
            <h2 class="text-3xl font-bold tracking-tight mb-4" data-i18n="cta_ninja_title">Have a Ninja Tip?</h2>
            <p class="max-w-xl opacity-90 mb-8 font-medium" data-i18n="cta_ninja_desc">If you've encountered a
                hard-to-solve WordPress issue and
                found a clever fix, we want to hear it! Help other developers save hours of debugging.</p>
            <a href="https://x.com/hadealahmad" target="_blank"
                class="bg-white text-zinc-950 px-8 py-3 rounded-xl font-bold flex items-center gap-3 hover:scale-105 transition-all">
                <i data-lucide="twitter" class="w-5 h-5"></i>
                <span data-i18n="cta_ninja_btn">Submit a Tip</span>
            </a>
        </div>

    </main>

    <!-- Global Footer Container -->
    <footer id="global-footer"></footer>

    <!-- Global Toast Container -->
    <div id="toast" class="fixed bottom-8 end-8 translate-y-24 opacity-0 z-50">
        <div class="shadcn-card px-6 py-4 bg-zinc-900 border-zinc-800 text-white flex items-center gap-3 shadow-2xl">
            <i data-lucide="check-circle" class="w-4 h-4 text-green-400"></i>
            <span id="toast-msg" class="text-sm font-medium">Notification</span>
        </div>
    </div>
</body>

</html>

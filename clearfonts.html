<!DOCTYPE html>
<html lang="en" style="background-color: #09090b; color: white;">

<head>
    <link rel="stylesheet" href="src/styles/main.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta charset="UTF-8">
    <meta name="theme-color" content="#09090b">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font Cleaner | WPToolbox</title>
    <meta name="description"
        content="Remove hardcoded font families from Gutenberg and Greenshift block comments automatically.">
    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://hadealahmad.github.io/WPtoolbox/clearfonts.html">
    <meta property="og:title" content="Font Cleaner | WPToolbox">
    <meta property="og:description" content="Clean hardcoded fonts from your block code instantly.">
    <meta property="og:image" content="https://hadealahmad.github.io/WPtoolbox/assets/og-image.png">
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@hadealahmad">
    <meta name="twitter:title" content="Font Cleaner | WPToolbox">
    <meta name="twitter:description" content="Clean hardcoded fonts from your block code instantly.">
    <meta name="twitter:image" content="https://hadealahmad.github.io/WPtoolbox/assets/og-image.png">

    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <script type="module" src="src/tools/clear-fonts.js"></script>
</head>

<body class="min-h-screen flex flex-col grid-bg">

    <!-- Navbar Container -->
    <wpt-navbar></wpt-navbar>

    <!-- Main Content -->
    <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-10">

        <header class="mb-10 text-center md:text-start">
            <h1 class="text-4xl font-extrabold tracking-tighter text-white" data-i18n="tool_font_cleaner_title">Block
                Font Cleaner</h1>
            <p class="text-zinc-500 mt-2" data-i18n="tool_font_cleaner_desc">Automatically remove hardcoded font-family
                definitions from Gutenberg and
                Greenshift block comments.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">

            <!-- Input Section -->
            <div class="space-y-4">
                <div class="flex justify-between items-center">
                    <label class="text-xs font-bold uppercase tracking-widest text-zinc-500"
                        data-i18n="label_input_block">Input Block Code</label>
                    <button class="text-xs text-zinc-500 hover:text-white transition-none"
                        data-i18n="btn_clear">Clear</button>
                </div>
                <div class="shadcn-card bg-zinc-950 border-zinc-800">
                    <textarea id="input"
                        class="w-full h-[500px] bg-transparent p-6 text-sm font-mono text-zinc-300 focus:outline-none resize-none leading-relaxed"
                        data-i18n-placeholder="placeholder_input_block"
                        placeholder="Paste your Gutenberg / Greenshift code here..."></textarea>
                </div>
            </div>

            <!-- Output Section -->
            <div class="space-y-4">
                <div class="flex justify-between items-center">
                    <label class="text-xs font-bold uppercase tracking-widest text-zinc-500"
                        data-i18n="label_cleaned_code">Cleaned Code</label>
                    <button class="shadcn-button shadcn-button-outline h-8 px-4 text-xs" data-i18n="btn_copy_result">Copy
                        Result</button>
                </div>
                <div class="shadcn-card bg-zinc-950 border-zinc-900 border-2">
                    <textarea id="output" readonly
                        class="w-full h-[500px] bg-transparent p-6 text-sm font-mono text-emerald-400 focus:outline-none resize-none leading-relaxed"
                        data-i18n-placeholder="placeholder_cleaned_code"
                        placeholder="Cleaned code will appear here..."></textarea>
                </div>
            </div>

        </div>

    </main>

    <!-- Global Footer Container -->
    <wpt-footer></wpt-footer>

    <!-- Global Toast Container -->
    <div id="toast" class="fixed bottom-8 end-8 translate-y-24 opacity-0 z-50">
        <div class="shadcn-card px-6 py-4 bg-zinc-900 border-zinc-800 text-white flex items-center gap-3 shadow-2xl">
            <i data-lucide="check-circle" class="w-4 h-4 text-green-400"></i>
            <span id="toast-msg" class="text-sm font-medium">Notification</span>
        </div>
    </div>

</body>

</html>

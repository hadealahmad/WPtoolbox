<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/svg+xml" href="./assets/favicon-CM9iQzMf.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WordPress Snippets | WPToolbox</title>
    <meta name="description"
        content="Production-ready WordPress snippets for performance, security, and development. Curated and high-impact.">
    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://hadealahmad.github.io/WPtoolbox/snippets.html">
    <meta property="og:title" content="WordPress Snippets | WPToolbox">
    <meta property="og:description" content="A curated collection of essential WordPress development snippets.">
    <meta property="og:image" content="https://hadealahmad.github.io/WPtoolbox/assets/og-image.png">
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@hadealahmad">
    <meta name="twitter:title" content="WordPress Snippets | WPToolbox">
    <meta name="twitter:description" content="A curated collection of essential WordPress development snippets.">
    <meta name="twitter:image" content="https://hadealahmad.github.io/WPtoolbox/assets/og-image.png">


    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
  <script type="module" crossorigin src="./assets/snippets-C78BlAVv.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/main-D56FifXV.js">
  <link rel="stylesheet" crossorigin href="./assets/main-I-Zus5hz.css">
</head>

<body class="min-h-screen flex flex-col grid-bg">

    <!-- Navbar Container -->
    <wpt-navbar></wpt-navbar>

    <!-- Main Content -->
    <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-10">

        <header class="mb-10 text-center md:text-start">
            <h1 class="text-4xl font-extrabold tracking-tighter text-white" data-i18n="tool_snippets_title">WordPress
                Snippets</h1>
            <p class="text-zinc-500 mt-2" data-i18n="tool_snippets_desc">A curated collection of production-ready
                snippets for
                .htaccess, wp-config, and PHP performance tuning.</p>
        </header>

        <!-- Search & Actions -->
        <div class="mb-12 space-y-8">
            <div class="flex flex-col md:flex-row gap-4 items-start md:items-center justify-between">
                <div class="w-full max-w-xl relative group">
                    <div
                        class="absolute inset-y-0 start-0 ps-4 flex items-center pointer-events-none text-zinc-500 group-focus-within:text-primary transition-none">
                        <i data-lucide="search" class="w-5 h-5"></i>
                    </div>
                    <input type="text" id="snippet-search"
                        class="w-full h-14 bg-zinc-900 border border-zinc-800 rounded-2xl ps-12 pe-4 text-white focus:outline-none focus:border-primary transition-none"
                        data-i18n-placeholder="search_placeholder" placeholder="Search snippets...">
                </div>

                <div class="flex gap-2 w-full md:w-auto overflow-x-auto pb-2 md:pb-0">
                    <button onclick="Snippets.showAddModal()"
                        class="shadcn-button h-14 px-6 bg-zinc-100 text-zinc-950 hover:bg-white transition-none whitespace-nowrap">
                        <i data-lucide="plus" class="w-4 h-4"></i>
                        <span data-i18n="add_snippet_btn">Add Snippet</span>
                    </button>
                    <button onclick="Snippets.exportUserSnippets()"
                        class="shadcn-button shadcn-button-outline h-14 w-14 p-0 flex items-center justify-center"
                        title="Export">
                        <i data-lucide="download" class="w-5 h-5"></i>
                    </button>
                    <button onclick="document.getElementById('import-input').click()"
                        class="shadcn-button shadcn-button-outline h-14 w-14 p-0 flex items-center justify-center"
                        title="Import">
                        <i data-lucide="upload" class="w-5 h-5"></i>
                        <input type="file" id="import-input" class="hidden" accept=".json"
                            onchange="Snippets.importUserSnippets(event)">
                    </button>
                </div>
            </div>

            <div id="categories" class="flex flex-wrap gap-2 p-1 bg-zinc-900 border border-zinc-800 rounded-lg">
                <!-- Injected by JS -->
            </div>
        </div>

        <!-- Snippets Grid -->
        <div id="snippets-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Injected by JS -->
            <div class="col-span-full py-20 text-center">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-zinc-800 border-t-primary">
                </div>
                <p class="mt-4 text-zinc-500 font-medium">Loading snippets library...</p>
            </div>
        </div>

    </main>

    <!-- Global Footer Container -->
    <wpt-footer></wpt-footer>

    <!-- Global Toast Container -->
    <div id="toast" class="fixed bottom-8 end-8 translate-y-24 opacity-0 z-50">
        <div class="shadcn-card px-6 py-4 bg-zinc-900 border-zinc-800 text-white flex items-center gap-3 shadow-2xl">
            <i data-lucide="check-circle" class="w-4 h-4 text-green-400"></i>
            <span id="toast-msg" class="text-sm font-medium">Notification</span>
        </div>
    </div>

    <!-- Add Snippet Modal -->
    <div id="snippet-modal"
        class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 bg-zinc-950/80 backdrop-blur-sm">
        <div
            class="w-full max-w-2xl bg-zinc-900 border border-zinc-800 rounded-2xl shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-200">
            <div class="px-6 py-4 border-b border-zinc-800 flex justify-between items-center">
                <h2 class="text-xl font-bold text-white" data-i18n="modal_add_title">Add New Snippet</h2>
                <button onclick="Snippets.hideAddModal()" class="text-zinc-500 hover:text-white transition-none">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            <form id="add-snippet-form" onsubmit="Snippets.handleAddSnippet(event)" class="p-6 space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-zinc-500 uppercase tracking-widest"
                            data-i18n="label_title">Title</label>
                        <input type="text" name="title" required
                            class="w-full h-12 bg-zinc-950 border border-zinc-800 rounded-xl px-4 text-white focus:outline-none focus:border-primary transition-none">
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-zinc-500 uppercase tracking-widest"
                            data-i18n="label_category">Category</label>
                        <input type="text" name="category" required
                            class="w-full h-12 bg-zinc-950 border border-zinc-800 rounded-xl px-4 text-white focus:outline-none focus:border-primary transition-none"
                            placeholder="e.g. Header, Security">
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-bold text-zinc-500 uppercase tracking-widest"
                        data-i18n="label_description">Description</label>
                    <textarea name="description" required
                        class="w-full h-24 bg-zinc-950 border border-zinc-800 rounded-xl p-4 text-white focus:outline-none focus:border-primary transition-none resize-none"></textarea>
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-bold text-zinc-500 uppercase tracking-widest" data-i18n="label_code">Code
                        Snippet</label>
                    <textarea name="code" required
                        class="w-full h-48 bg-zinc-950 border border-zinc-800 rounded-xl p-4 text-white font-mono text-sm focus:outline-none focus:border-primary transition-none"></textarea>
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-bold text-zinc-500 uppercase tracking-widest"
                        data-i18n="label_language">Language</label>
                    <input type="text" name="language" required
                        class="w-full h-12 bg-zinc-950 border border-zinc-800 rounded-xl px-4 text-white focus:outline-none focus:border-primary transition-none"
                        placeholder="PHP, CSS, JS, SQL, HTML...">
                </div>
                <div class="flex gap-4 pt-4">
                    <button type="submit" class="flex-1 shadcn-button bg-zinc-100 text-zinc-950 hover:bg-white h-12"
                        data-i18n="btn_save">Save Snippet</button>
                    <button type="button" onclick="Snippets.hideAddModal()"
                        class="flex-1 shadcn-button shadcn-button-outline h-12" data-i18n="btn_cancel">Cancel</button>
                </div>
            </form>
        </div>
    </div>
</body>

</html>

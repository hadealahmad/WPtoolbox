<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON to CSV | WPToolbox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/globals.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="js/core.js" defer></script>
    <script src="js/json-converter.js" defer></script>
</head>

<body class="min-h-screen flex flex-col grid-bg">

    <!-- Navbar Container -->
    <nav id="global-nav" class="sticky top-0 z-50 glass-header"></nav>

    <!-- Main Content -->
    <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-10">

        <header class="mb-10 text-center md:text-left">
            <h1 class="text-4xl font-extrabold tracking-tighter text-white">JSON to CSV Converter</h1>
            <p class="text-zinc-500 mt-2">Convert JSON files with a <span
                    class="text-zinc-300 font-semibold underline decoration-zinc-700">"data"</span>
                array to structured CSV format.</p>
        </header>

        <!-- Upload Section -->
        <section class="animate-fade-in" style="animation-delay: 0.1s;">
            <div id="drop-zone"
                class="shadcn-card border-2 border-dashed p-16 text-center cursor-pointer hover:bg-zinc-900/50 group">
                <input id="file-input" type="file" accept=".json" class="hidden">
                <div class="flex flex-col items-center gap-6">
                    <div
                        class="w-16 h-16 bg-zinc-800 rounded-full flex items-center justify-center text-zinc-400 group-hover:scale-110 group-hover:bg-primary group-hover:text-primary-foreground">
                        <i data-lucide="file-json" class="w-8 h-8"></i>
                    </div>
                    <div class="space-y-2">
                        <p class="text-xl font-semibold text-white">Drop JSON file here</p>
                        <p class="text-zinc-400 text-sm">or click to browse your computer</p>
                    </div>
                </div>
            </div>
            <div id="status-bar"
                class="hidden mt-4 p-4 border border-zinc-800 rounded-xl bg-zinc-900 shadow-sm flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div id="status-icon" class="p-1.5 bg-blue-900/20 text-blue-400 rounded-lg">
                        <i data-lucide="loader-2" class="w-4 h-4"></i>
                    </div>
                    <span id="status-text" class="text-sm font-medium text-zinc-400">Processing
                        file...</span>
                </div>
                <button id="download-btn" disabled
                    class="shadcn-button shadcn-button-primary h-10 px-6 opacity-50 cursor-not-allowed">
                    <i data-lucide="download" class="w-4 h-4"></i>
                    Download CSV
                </button>
            </div>
        </section>

        <!-- Preview -->
        <section id="preview-section" class="hidden mt-12 space-y-4">
            <h3 class="text-xs font-bold uppercase tracking-[0.2em] text-zinc-400 flex items-center gap-2">
                <i data-lucide="eye" class="w-4 h-4"></i>
                CSV Output Preview
            </h3>
            <div class="shadcn-card bg-zinc-900 border-zinc-800 p-6 overflow-hidden relative">
                <div
                    class="absolute top-4 right-4 text-[10px] font-bold text-zinc-700 uppercase tracking-widest pointer-events-none">
                    TTY_TERMINAL</div>
                <div id="csv-preview"
                    class="font-mono text-xs text-emerald-400/90 leading-relaxed whitespace-pre overflow-auto max-h-[400px] scrollbar-hide">
                    Upload a file to see preview...
                </div>
            </div>
        </section>

    </main>

    <!-- Global Footer Container -->
    <footer id="global-footer"></footer>

    <!-- Global Toast Container -->
    <div id="toast" class="fixed bottom-8 right-8 translate-y-24 opacity-0 z-50">
        <div class="shadcn-card px-6 py-4 bg-zinc-900 dark:bg-zinc-800 text-white flex items-center gap-3 shadow-2xl">
            <i data-lucide="check-circle" class="w-4 h-4 text-green-400"></i>
            <span id="toast-msg" class="text-sm font-medium">Notification</span>
        </div>
    </div>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON to CSV | WPToolbox</title>
    <meta name="description"
        content="Extract and convert structured JSON data arrays into clean CSV files instantly. Safe and browser-based.">
    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://hadealahmad.github.io/WPtoolbox/json2csv.html">
    <meta property="og:title" content="JSON to CSV Converter | WPToolbox">
    <meta property="og:description" content="Small, fast utility for JSON to CSV conversion.">
    <meta property="og:image" content="https://hadealahmad.github.io/WPtoolbox/assets/og-image.png">
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@hadealahmad">
    <meta name="twitter:title" content="JSON to CSV Converter | WPToolbox">
    <meta name="twitter:description" content="Small, fast utility for JSON to CSV conversion.">
    <meta name="twitter:image" content="https://hadealahmad.github.io/WPtoolbox/assets/og-image.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/globals.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="js/core.js" defer></script>
</head>

<body class="min-h-screen flex flex-col grid-bg">

    <!-- Navbar Container -->
    <nav id="global-nav" class="sticky top-0 z-50 glass-header"></nav>

    <!-- Main Content -->
    <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-10">

        <header class="mb-10 text-center md:text-start">
            <h1 class="text-4xl font-extrabold tracking-tighter text-white" data-i18n="tool_json2csv_title">JSON to CSV
                Converter</h1>
            <p class="text-zinc-500 mt-2" data-i18n="tool_json2csv_desc">Extract and convert structured JSON data arrays
                into clean CSV files for
                spreadsheet analysis.</p>
        </header>

        <div class="grid grid-cols-1 gap-10">
            <!-- Input Card -->
            <div class="shadcn-card border-zinc-800 bg-zinc-950/50 overflow-hidden">
                <!-- Tab Headers -->
                <div class="flex border-b border-zinc-800 bg-zinc-900/30">
                    <button id="tab-file-btn"
                        class="px-8 py-4 text-xs font-bold uppercase tracking-widest border-b-2 border-primary text-white transition-none"
                        data-i18n="tab_file">
                        File Upload
                    </button>
                    <button id="tab-text-btn"
                        class="px-8 py-4 text-xs font-bold uppercase tracking-widest border-b-2 border-transparent text-zinc-500 hover:text-zinc-300 transition-none"
                        data-i18n="tab_text">
                        Paste Text
                    </button>
                </div>

                <!-- Tab Content: File -->
                <div id="file-tab-content" class="p-10">
                    <div id="drop-zone"
                        class="border-2 border-dashed border-zinc-800 rounded-2xl p-20 text-center cursor-pointer hover:bg-zinc-900/50 group transition-none">
                        <input type="file" id="fileInput" accept=".json" class="hidden">
                        <div class="flex flex-col items-center gap-6">
                            <div
                                class="w-16 h-16 bg-zinc-800 rounded-full flex items-center justify-center text-zinc-400 group-hover:scale-110 group-hover:bg-primary group-hover:text-primary-foreground transition-none">
                                <i data-lucide="upload-cloud" class="w-8 h-8"></i>
                            </div>
                            <div class="space-y-2">
                                <p class="text-xl font-semibold text-white" data-i18n="drop_json">Drop your JSON file
                                    here
                                </p>
                                <p class="text-zinc-400 text-sm" data-i18n="drop_browse">or click to browse your files
                                </p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Tab Content: Text -->
                <div id="text-tab-content" class="p-10 hidden space-y-6">
                    <textarea id="textInput"
                        class="w-full h-[400px] bg-zinc-950 border border-zinc-800 rounded-xl p-6 text-sm font-mono text-zinc-300 focus:outline-none focus:border-primary resize-none leading-relaxed"
                        placeholder='[{"id": 1, "name": "Example"}]'></textarea>
                    <div class="flex justify-end">
                        <button id="convertTextBtn"
                            class="shadcn-button shadcn-button-primary h-12 px-10 text-xs gap-2">
                            <i data-lucide="zap" class="w-4 h-4"></i>
                            <span data-i18n="btn_convert">Convert to CSV</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Result Section -->
            <div id="result" class="hidden space-y-4">
                <div class="flex justify-between items-center">
                    <h3 class="text-xs font-bold uppercase tracking-widest text-zinc-500" data-i18n="conversion_ready">
                        Conversion Ready</h3>
                    <div class="flex gap-2">
                        <button onclick="location.reload()"
                            class="shadcn-button shadcn-button-outline h-10 px-6 text-xs" data-i18n="reset_btn">
                            Reset
                        </button>
                        <button onclick="downloadCSV()"
                            class="shadcn-button shadcn-button-primary h-10 px-8 text-xs gap-2">
                            <i data-lucide="download" class="w-4 h-4"></i>
                            <span data-i18n="btn_download_csv">Download CSV</span>
                        </button>
                    </div>
                </div>
                <div class="shadcn-card bg-zinc-950 border-zinc-800 overflow-hidden">
                    <div class="p-6 border-b border-zinc-900 flex items-center justify-between bg-zinc-900/50">
                        <div class="flex items-center gap-4">
                            <div class="p-2 bg-emerald-500/10 rounded-lg">
                                <i data-lucide="check-circle" class="w-5 h-5 text-emerald-500"></i>
                            </div>
                            <div>
                                <p id="fileName" class="text-sm font-bold text-white">data-export.csv</p>
                                <p id="fileMeta" class="text-xs text-zinc-500 mt-0.5" data-i18n="msg_csv_success">CSV
                                    generated successfully!</p>
                            </div>
                        </div>
                        <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest"
                            data-i18n="preview_data">Data Preview (Top 5)</span>
                    </div>
                    <div class="overflow-x-auto">
                        <table id="previewTable" class="w-full text-left border-collapse">
                            <!-- Injected by JS -->
                        </table>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- Global Footer Container -->
    <footer id="global-footer"></footer>

    <!-- Global Toast Container -->
    <div id="toast" class="fixed bottom-8 end-8 translate-y-24 opacity-0 z-50">
        <div class="shadcn-card px-6 py-4 bg-zinc-900 border-zinc-800 text-white flex items-center gap-3 shadow-2xl">
            <i data-lucide="check-circle" class="w-4 h-4 text-green-400"></i>
            <span id="toast-msg" class="text-sm font-medium">Notification</span>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('fileInput');
        const textInput = document.getElementById('textInput');
        const fileTabBtn = document.getElementById('tab-file-btn');
        const textTabBtn = document.getElementById('tab-text-btn');
        const fileTabContent = document.getElementById('file-tab-content');
        const textTabContent = document.getElementById('text-tab-content');
        const convertTextBtn = document.getElementById('convertTextBtn');
        const resultSection = document.getElementById('result');

        // Tab Switching Logic
        fileTabBtn.onclick = () => {
            fileTabBtn.classList.add('border-primary', 'text-white');
            fileTabBtn.classList.remove('border-transparent', 'text-zinc-500');
            textTabBtn.classList.remove('border-primary', 'text-white');
            textTabBtn.classList.add('border-transparent', 'text-zinc-500');
            fileTabContent.classList.remove('hidden');
            textTabContent.classList.add('hidden');
        };

        textTabBtn.onclick = () => {
            textTabBtn.classList.add('border-primary', 'text-white');
            textTabBtn.classList.remove('border-transparent', 'text-zinc-500');
            fileTabBtn.classList.remove('border-primary', 'text-white');
            fileTabBtn.classList.add('border-transparent', 'text-zinc-500');
            textTabContent.classList.remove('hidden');
            fileTabContent.classList.add('hidden');
        };

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        dropZone.ondragover = (e) => {
            e.preventDefault();
            dropZone.classList.add('border-primary');
        };
        dropZone.ondragleave = () => dropZone.classList.remove('border-primary');
        dropZone.ondrop = (e) => {
            e.preventDefault();
            handleFile(e.dataTransfer.files[0]);
        };

        convertTextBtn.onclick = () => {
            const content = textInput.value.trim();
            if (!content) {
                App.showToast(App.t('msg_enter_json'));
                return;
            }
            processJSON(content);
        };

        function handleFile(file) {
            if (!file || !file.name.endsWith('.json')) {
                App.showToast('Please upload a valid JSON file.');
                return;
            }
            const reader = new FileReader();
            reader.onload = (e) => processJSON(e.target.result);
            reader.readAsText(file);
        }

        function processJSON(jsonString) {
            try {
                const data = JSON.parse(jsonString);
                if (!Array.isArray(data)) {
                    App.showToast(App.t('msg_json_array'));
                    return;
                }

                const keys = Object.keys(data[0]);
                const csvRows = [];
                csvRows.push(keys.join(','));

                for (const row of data) {
                    const values = keys.map(key => {
                        const val = row[key] === null || row[key] === undefined ? "" : row[key];
                        const escaped = ('' + val).replace(/"/g, '""');
                        return `"${escaped}"`;
                    });
                    csvRows.push(values.join(','));
                }

                const csvString = csvRows.join('\n');

                // Add download button manually since UI doesn't have it yet or use hidden link
                renderPreview(csvRows);

                resultSection.classList.remove('hidden');
                document.querySelector('.shadcn-card.border-zinc-800').classList.add('hidden');
                App.showToast(App.t('msg_csv_success'));
                App.fireConfetti();

                // Store for download
                window.currentCSV = csvString;

            } catch (e) {
                App.showToast(App.t('msg_invalid_json'));
            }
        }

        function renderPreview(csvRows) {
            const table = document.getElementById('previewTable');
            const rows = csvRows.slice(0, 6).map(r => r.split(','));

            table.innerHTML = `
                <thead class="bg-zinc-900/50">
                    <tr>
                        ${rows[0].map(h => `<th class="px-6 py-3 text-[10px] font-bold text-zinc-500 uppercase tracking-widest border-b border-zinc-900">${h}</th>`).join('')}
                    </tr>
                </thead>
                <tbody class="divide-y divide-zinc-900">
                    ${rows.slice(1).map(row => `
                        <tr>
                            ${row.map(cell => `<td class="px-6 py-4 text-xs text-zinc-400 max-w-[200px] truncate">${cell.replace(/^"|"$/g, '')}</td>`).join('')}
                        </tr>
                    `).join('')}
                </tbody>
            `;
        }

        function downloadCSV() {
            if (window.currentCSV) {
                App.downloadFile(window.currentCSV, "data-export.csv", 'text/csv;charset=utf-8;');
                App.fireConfetti();
            }
        }
    </script>
</body>

</html>

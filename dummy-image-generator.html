<!DOCTYPE html>
<html lang="en" style="background-color: #09090b; color: white;">

<head>
    <link rel="stylesheet" href="src/styles/main.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta charset="UTF-8">
    <meta name="theme-color" content="#09090b">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="title_dummy_image">Dummy Image Generator | WPToolbox</title>
    <meta name="description" content="Generate batch dummy placeholder images in a ZIP file for theme development.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <script type="module" src="src/tools/dummy-image-generator.js"></script>
</head>

<body class="min-h-screen flex flex-col grid-bg">

    <wpt-navbar></wpt-navbar>

    <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-10">
        <header class="mb-10 text-center md:text-start">
            <h1 class="text-4xl font-extrabold tracking-tighter text-white" data-i18n="tool_dummy_image_title">Dummy Image Generator</h1>
            <p class="text-zinc-500 mt-2" data-i18n="tool_dummy_image_desc">Generate a batch of lightweight placeholder images with custom dimensions, colors, and text.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">

            <!-- Controls Column -->
            <div class="lg:col-span-5 space-y-8">
                <section class="shadcn-card p-6">
                    <h3 class="text-xs font-bold uppercase tracking-[0.2em] text-zinc-500 mb-6 flex items-center gap-2">
                        <i data-lucide="settings" class="w-4 h-4"></i>
                        Settings
                    </h3>
                    
                    <div class="space-y-6">
                        <div>
                            <label class="block text-sm font-medium text-zinc-300 mb-2" data-i18n="label_dimensions">Dimensions (e.g. 1200x630, 800x800)</label>
                            <textarea id="input-dimensions" rows="4" 
                                class="shadcn-input min-h-[100px] font-mono text-sm resize-y" 
                                data-i18n-placeholder="placeholder_dimensions" 
                                placeholder="1200x630&#10;800x800&#10;400x400"></textarea>
                            <p class="text-xs text-zinc-500 mt-2">One per line. E.g., 1920x1080</p>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-zinc-300 mb-2" data-i18n="label_text_overlay">Text Overlay (Optional)</label>
                            <input type="text" id="input-text" class="shadcn-input" placeholder="Placeholder Image">
                            <p class="text-xs text-zinc-500 mt-2">Leave blank to just show the dimensions (e.g. "800 x 600")</p>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-zinc-300 mb-2" data-i18n="label_bg_color">Background Color</label>
                                <div class="flex items-center gap-2">
                                    <input type="color" id="input-bg" value="#3f3f46" class="w-10 h-10 rounded border border-zinc-700 cursor-pointer bg-transparent">
                                    <span id="bg-hex" class="text-sm text-zinc-400 font-mono">#3f3f46</span>
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-zinc-300 mb-2" data-i18n="label_text_color">Text Color</label>
                                <div class="flex items-center gap-2">
                                    <input type="color" id="input-color" value="#ffffff" class="w-10 h-10 rounded border border-zinc-700 cursor-pointer bg-transparent">
                                    <span id="color-hex" class="text-sm text-zinc-400 font-mono">#ffffff</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <button id="btn-generate" class="shadcn-button shadcn-button-primary w-full h-12 text-sm font-semibold gap-2">
                    <i data-lucide="image-plus" class="w-5 h-5"></i>
                    <span data-i18n="btn_generate_images">Generate Images</span>
                </button>
            </div>

            <!-- Preview Column -->
            <div class="lg:col-span-7 space-y-6">
                <div class="shadcn-card p-6 h-full flex flex-col items-center justify-center min-h-[400px] border-dashed border-2 bg-zinc-900/20">
                    <div id="preview-container" class="w-full h-full flex flex-col items-center justify-center">
                        <canvas id="preview-canvas" dir="ltr" class="max-w-full max-h-[300px] rounded shadow-lg hidden"></canvas>
                        <div id="preview-placeholder" class="text-zinc-500 text-center flex flex-col items-center gap-4">
                            <i data-lucide="images" class="w-12 h-12 opacity-50"></i>
                            <p>Configure settings to preview</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <wpt-footer></wpt-footer>

    <div id="toast" class="fixed bottom-8 end-8 translate-y-24 opacity-0 z-50">
        <div class="shadcn-card px-6 py-4 bg-zinc-900 border-zinc-800 text-white flex items-center gap-3 shadow-2xl">
            <i data-lucide="check-circle" class="w-4 h-4 text-green-400"></i>
            <span id="toast-msg" class="text-sm font-medium">Notification</span>
        </div>
    </div>
</body>
</html>

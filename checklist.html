<!DOCTYPE html>
<html lang="en" style="background-color: #09090b; color: white;">

<head>
    <link rel="stylesheet" href="src/styles/main.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta charset="UTF-8">
    <meta name="theme-color" content="#09090b">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="title_checklist.html">New Website Checklist | WPToolbox</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <script type="module" src="src/tools/checklist.js"></script>
</head>

<body class="min-h-screen flex flex-col grid-bg">

    <!-- Navbar Container -->
    <wpt-navbar></wpt-navbar>

    <!-- Main Content -->
    <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-10">

        <header class="mb-10 text-center md:text-start flex flex-col md:flex-row justify-between items-center md:items-end gap-6">
            <div class="max-w-2xl">
                <h1 class="text-4xl font-extrabold tracking-tighter text-white" data-i18n="tool_checklist_title">Website Checklist</h1>
                <p class="text-zinc-500 mt-2" data-i18n="tool_checklist_desc">Ensure your WordPress site is production-ready with a professional pre-launch checklist.</p>
            </div>
            <div class="flex gap-2 w-full md:w-auto shrink-0">
                 <button id="import-btn" class="flex-1 md:flex-none shadcn-button shadcn-button-outline h-10 px-4 text-xs gap-2 border-zinc-800 hover:bg-zinc-900 transition-all">
                    <i data-lucide="upload" class="w-3.5 h-3.5"></i>
                    <span data-i18n="btn_import_checklist">Import</span>
                    <input type="file" id="import-all-input" class="hidden" accept=".json">
                </button>
                <button id="export-btn" class="flex-1 md:flex-none shadcn-button shadcn-button-outline h-10 px-4 text-xs gap-2 border-zinc-800 hover:bg-zinc-900 transition-all">
                    <i data-lucide="download" class="w-3.5 h-3.5"></i>
                    <span data-i18n="btn_export_checklist">Export</span>
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-12 gap-6 items-start">

            <!-- Col 1: Sites List -->
            <div class="md:col-span-3 space-y-6">
                <div class="flex items-center justify-between">
                    <h3 class="text-[10px] font-bold uppercase tracking-widest text-zinc-500" data-i18n="label_sites">Sites</h3>
                    <button id="add-site-btn" class="w-8 h-8 rounded-full bg-primary/10 text-primary hover:bg-primary hover:text-white transition-all flex items-center justify-center">
                        <i data-lucide="plus" class="w-4 h-4"></i>
                    </button>
                </div>
                <div id="sites-list" class="space-y-2">
                    <!-- Sites injected here -->
                </div>
            </div>

            <!-- Col 2: Site Progress & Filters -->
            <div class="md:col-span-3 space-y-6 sticky top-24">
                <section class="shadcn-card p-6 bg-zinc-900/40">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-xs font-bold uppercase tracking-[0.2em] text-zinc-500" data-i18n="label_progress">
                            Launch Readiness
                        </h3>
                        <span id="active-site-progress" class="text-sm font-mono text-primary">0%</span>
                    </div>
                    <div class="h-1.5 w-full bg-zinc-800 rounded-full overflow-hidden">
                        <div id="active-site-progress-bar" class="h-full bg-primary transition-all duration-500" style="width: 0%"></div>
                    </div>
                </section>

                <div id="category-filters" class="space-y-2">
                    <button id="filter-all" class="filter-btn w-full text-start px-4 py-3 rounded-xl border border-zinc-800 bg-zinc-900/50 hover:bg-zinc-800 transition-all flex justify-between items-center group active" data-category="all">
                        <div class="flex items-center gap-3">
                            <i data-lucide="layers" class="w-4 h-4 text-zinc-500 group-hover:text-primary"></i>
                            <span class="text-sm font-medium" data-i18n="cat_all_tasks">All Tasks</span>
                        </div>
                        <span id="count-all" class="text-[10px] font-bold bg-zinc-800 px-1.5 py-0.5 rounded text-zinc-500">0</span>
                    </button>
                    <!-- other categories injected or static -->
                    <button id="filter-wp" class="filter-btn w-full text-start px-4 py-3 rounded-xl border border-zinc-800 bg-zinc-900/50 hover:bg-zinc-800 transition-all flex justify-between items-center group" data-category="wp">
                        <div class="flex items-center gap-3">
                            <i data-lucide="layout" class="w-4 h-4 text-zinc-500 group-hover:text-primary"></i>
                            <span class="text-sm font-medium" data-i18n="cat_wp">WordPress</span>
                        </div>
                        <span id="count-wp" class="text-[10px] font-bold bg-zinc-800 px-1.5 py-0.5 rounded text-zinc-500">0</span>
                    </button>
                    <button id="filter-seo" class="filter-btn w-full text-start px-4 py-3 rounded-xl border border-zinc-800 bg-zinc-900/50 hover:bg-zinc-800 transition-all flex justify-between items-center group" data-category="seo">
                        <div class="flex items-center gap-3">
                            <i data-lucide="search" class="w-4 h-4 text-zinc-500 group-hover:text-primary"></i>
                            <span class="text-sm font-medium" data-i18n="cat_seo">SEO</span>
                        </div>
                        <span id="count-seo" class="text-[10px] font-bold bg-zinc-800 px-1.5 py-0.5 rounded text-zinc-500">0</span>
                    </button>
                    <button id="filter-woo" class="filter-btn w-full text-start px-4 py-3 rounded-xl border border-zinc-800 bg-zinc-900/50 hover:bg-zinc-800 transition-all flex justify-between items-center group" data-category="woo">
                        <div class="flex items-center gap-3">
                            <i data-lucide="shopping-cart" class="w-4 h-4 text-zinc-500 group-hover:text-primary"></i>
                            <span class="text-sm font-medium" data-i18n="cat_woo">WooCommerce</span>
                        </div>
                        <span id="count-woo" class="text-[10px] font-bold bg-zinc-800 px-1.5 py-0.5 rounded text-zinc-500">0</span>
                    </button>
                </div>
            </div>

            <!-- Col 3: Tasks List Overlay -->
            <div class="md:col-span-6 space-y-6 min-h-[600px]">
                <div id="empty-checklist" class="shadcn-card border-2 border-dashed p-16 text-center flex flex-col items-center justify-center h-full min-h-[400px]">
                     <div class="w-16 h-16 bg-zinc-800/50 rounded-full flex items-center justify-center text-zinc-500 mb-6">
                        <i data-lucide="layout-list" class="w-8 h-8"></i>
                    </div>
                    <p class="text-xl font-semibold text-zinc-400" data-i18n="msg_select_site">Select a site to see its checklist</p>
                </div>

                <div id="checklist-content" class="hidden space-y-6">
                    <div class="flex items-center justify-between">
                         <h2 id="active-site-name" class="text-2xl font-bold text-white tracking-tight">Site Name</h2>
                    </div>

                    <div class="flex gap-2">
                        <input type="text" id="new-task-input" class="flex-1 bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all" data-i18n-placeholder="placeholder_task_name" placeholder="Add a custom task...">
                        <button id="add-task-btn" class="shadcn-button shadcn-button-primary px-6 rounded-xl h-12 shadow-lg shadow-primary/20">
                            <i data-lucide="plus" class="w-4 h-4"></i>
                        </button>
                    </div>

                    <div id="tasks-container" class="space-y-3">
                        <!-- Tasks injected here -->
                    </div>
                </div>
            </div>

        </div>

    </main>

    <!-- Site Add Modal -->
    <div id="site-modal" class="fixed inset-0 z-[100] bg-black/80 backdrop-blur-sm hidden flex items-center justify-center p-4">
        <div class="shadcn-card max-w-sm w-full p-6 space-y-4 animate-in fade-in zoom-in-95 duration-200">
            <h3 class="text-lg font-bold text-white tracking-tight" data-i18n="modal_add_site">Add New Site</h3>
            <div class="space-y-4">
                <div>
                    <input type="text" id="site-name-input" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-primary transition-all" data-i18n-placeholder="placeholder_site_name" placeholder="Site name...">
                </div>
            </div>
            <div class="flex justify-end gap-3 pt-4">
                <button id="close-site-modal-btn" class="shadcn-button shadcn-button-outline px-4 text-xs" data-i18n="btn_cancel">Cancel</button>
                <button id="confirm-add-site-btn" class="shadcn-button shadcn-button-primary px-6 text-xs" data-i18n="btn_save_site">Save Site</button>
            </div>
        </div>
    </div>

    <!-- Task Edit Modal -->
    <div id="edit-modal" class="fixed inset-0 z-[100] bg-black/80 backdrop-blur-sm hidden flex items-center justify-center p-4">
        <div class="shadcn-card max-w-lg w-full p-6 space-y-4 animate-in fade-in zoom-in-95 duration-200">
            <h3 class="text-lg font-bold text-white tracking-tight" data-i18n="modal_edit_task">Edit Task</h3>
            <div class="space-y-4">
                <div>
                    <textarea id="edit-task-input" rows="4" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-primary transition-all resize-none"></textarea>
                </div>
            </div>
            <div class="flex justify-end gap-3 pt-2">
                <button id="close-edit-modal-btn" class="shadcn-button shadcn-button-outline px-4 text-xs" data-i18n="btn_cancel">Cancel</button>
                <button id="save-edit-task-btn" class="shadcn-button shadcn-button-primary px-6 text-xs" data-i18n="btn_save_changes">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- Global Footer Container -->
    <wpt-footer></wpt-footer>

    <!-- Global Toast Container -->
    <div id="toast" class="fixed bottom-8 end-8 translate-y-24 opacity-0 z-50 transition-all duration-300">
        <div class="shadcn-card px-6 py-4 bg-zinc-900 border-zinc-800 text-white flex items-center gap-3 shadow-2xl">
            <i data-lucide="check-circle" class="w-4 h-4 text-green-400"></i>
            <span id="toast-msg" class="text-sm font-medium">Notification</span>
        </div>
    </div>
</body>
</html>

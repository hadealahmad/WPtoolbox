<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Awesome Stack | WPToolbox</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=1.1">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script src="js/core.js" defer></script>
    <script src="js/awesome-stack.js" defer></script>
</head>

<body class="min-h-screen flex flex-col grid-bg">

    <!-- Navbar Container -->
    <nav id="global-nav" class="sticky top-0 z-50 glass-header"></nav>

    <!-- Main Content -->
    <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-10">

        <header class="mb-10 text-center md:text-start">
            <h1 class="text-4xl font-extrabold tracking-tighter text-white" data-i18n="tool_awesome_stack_title">
                Awesome Stack</h1>
            <p class="text-zinc-500 mt-2" data-i18n="tool_awesome_stack_desc">Generate a one-liner WP-CLI command to set
                up your ideal
                WordPress theme and plugin stack instantly.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">

            <!-- Options Column -->
            <div class="lg:col-span-4 space-y-8">
                <section class="shadcn-card p-6">
                    <h3 class="text-xs font-bold uppercase tracking-[0.2em] text-zinc-500 mb-6 flex items-center gap-2"
                        data-i18n="stack_select_themes">
                        <i data-lucide="palette" class="w-4 h-4"></i>
                        Select Themes
                    </h3>
                    <div id="theme-options" class="grid grid-cols-1 gap-2">
                        <!-- Injected by JS -->
                    </div>
                </section>

                <section class="shadcn-card p-6">
                    <h3 class="text-xs font-bold uppercase tracking-[0.2em] text-zinc-500 mb-6 flex items-center gap-2"
                        data-i18n="stack_select_plugins">
                        <i data-lucide="blocks" class="w-4 h-4"></i>
                        Select Plugins
                    </h3>
                    <div id="plugin-options" class="grid grid-cols-1 gap-2">
                        <!-- Injected by JS -->
                    </div>
                </section>

                <section class="pt-6 border-t border-zinc-800">
                    <div class="flex items-center gap-3">
                        <div class="relative flex items-center justify-center">
                            <input type="checkbox" id="include-activate" checked
                                class="peer appearance-none w-4 h-4 rounded border border-primary shrink-0 checked:bg-primary transition-none cursor-pointer focus:outline-none focus:ring-2 focus:ring-primary/20">
                            <i data-lucide="check"
                                class="absolute w-3 h-3 text-white opacity-0 peer-checked:opacity-100 pointer-events-none"></i>
                        </div>
                        <label for="include-activate" class="text-sm font-medium text-zinc-300 cursor-pointer"
                            data-i18n="stack_auto_activate">Auto-activate
                            after
                            install (--activate)</label>
                    </div>
                </section>
            </div>

            <!-- Command Preview -->
            <div class="lg:col-span-8 flex flex-col gap-6">
                <div class="shadcn-card bg-zinc-950 border-zinc-800 flex flex-col h-full min-h-[400px] overflow-hidden">
                    <div
                        class="px-6 py-4 border-b border-zinc-800 flex flex-col sm:flex-row gap-4 justify-between items-center bg-zinc-900/40">
                        <div class="flex items-center gap-2 w-full sm:w-auto overflow-hidden">
                            <div class="flex gap-1.5 shrink-0">
                                <div class="w-3 h-3 rounded-full bg-red-500/80"></div>
                                <div class="w-3 h-3 rounded-full bg-amber-500/80"></div>
                                <div class="w-3 h-3 rounded-full bg-emerald-500/80"></div>
                            </div>
                            <span class="ms-4 text-[10px] font-bold uppercase tracking-widest text-zinc-600 truncate"
                                data-i18n="stack_console">WP-CLI CONSOLE</span>
                        </div>
                        <div class="flex flex-wrap gap-2 justify-end">
                            <button id="download-sh-btn"
                                class="shadcn-button shadcn-button-outline h-8 px-3 text-[10px] gap-2">
                                <i data-lucide="terminal" class="w-3 h-3"></i>
                                <span data-i18n="btn_download_sh">Download .sh</span>
                            </button>
                            <button id="download-yml-btn"
                                class="shadcn-button shadcn-button-outline h-8 px-3 text-[10px] gap-2">
                                <i data-lucide="file-code" class="w-3 h-3"></i>
                                <span>Blueprint</span>
                            </button>
                            <button id="copy-btn"
                                class="shadcn-button shadcn-button-primary h-8 px-3 text-[10px] gap-2">
                                <i data-lucide="copy" class="w-3 h-3"></i>
                                <span data-i18n="copy_btn">Copy</span>
                            </button>
                        </div>
                    </div>
                    <pre class="p-8 flex-1 overflow-x-auto text-sm font-mono text-zinc-300 leading-relaxed select-all"
                        id="command-output"># Your command will appear here...</pre>
                </div>

                <!-- Save Stack Section -->
                <div class="flex flex-col gap-6">
                    <div class="flex justify-between items-center">
                        <h3 class="text-xs font-bold uppercase tracking-widest text-zinc-500"
                            data-i18n="label_saved_stacks">Saved Stacks</h3>
                        <button id="save-stack-btn" class="shadcn-button shadcn-button-primary h-10 px-6 text-xs gap-2">
                            <i data-lucide="save" class="w-4 h-4"></i>
                            <span data-i18n="btn_save_stack">Save Stack</span>
                        </button>
                    </div>
                    <div id="saved-stacks-container" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <!-- Saved stacks will be injected here -->
                    </div>
                </div>
            </div>

        </div>

    </main>

    <!-- Global Footer Container -->
    <footer id="global-footer"></footer>

    <!-- Global Toast Container -->
    <div id="toast" class="fixed bottom-8 end-8 translate-y-24 opacity-0 z-50">
        <div class="shadcn-card px-6 py-4 bg-zinc-900 border-zinc-800 text-white flex items-center gap-3 shadow-2xl">
            <i data-lucide="check-circle" class="w-4 h-4 text-green-400"></i>
            <span id="toast-msg" class="text-sm font-medium">Notification</span>
        </div>
    </div>
</body>

</html>
